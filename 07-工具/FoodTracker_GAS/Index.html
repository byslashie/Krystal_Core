<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Krystal Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F5F1;
  --blue:#A8C5E8;
  --blue-deep:#6FA8D4;
  --peach:#F0A888;
  --peach-deep:#E07848;
  --glass:rgba(255,255,255,0.62);
  --glass-border:rgba(255,255,255,0.85);
  --text:#1A1814;
  --text-2:#6B6560;
  --text-3:#9E9891;
  --shadow:0 8px 32px rgba(0,0,0,0.08);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.12);
  --r:20px;
  --r-lg:28px;
  --nav-h:80px;
  --safe-b:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

/* ── Aura Background ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(168,197,232,0.45) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 90% 100%,  rgba(240,168,136,0.40) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 50%,   rgba(255,255,255,0.15) 0%, transparent 70%),
    var(--bg);
  pointer-events:none;
}

/* ── Layout ── */
#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
#scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--nav-h) + var(--safe-b) + 8px);scrollbar-width:none}
#scroll-area::-webkit-scrollbar{display:none}

/* ── Glass Card ── */
.card{
  background:var(--glass);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow);
}

/* ── Views ── */
.view{display:none;padding:0 16px;animation:fadeUp .25s ease}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── Header ── */
.page-header{padding:52px 16px 8px;display:flex;align-items:flex-end;justify-content:space-between}
.page-header h1{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-2)}
.date-nav{display:flex;align-items:center;gap:8px}
.date-nav button{width:32px;height:32px;border:none;background:var(--glass);backdrop-filter:blur(16px);border-radius:50%;cursor:pointer;font-size:14px;color:var(--text-2);border:1px solid var(--glass-border)}
.date-display{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.date-sub{font-size:12px;color:var(--text-3);font-weight:500;margin-top:1px}

/* ── Hero Calorie Card ── */
.hero-card{padding:28px 24px 20px;margin:8px 0 12px;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-20px;right:-20px;width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,rgba(168,197,232,.30),rgba(240,168,136,.25));filter:blur(30px)}
.hero-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.hero-kcal{display:flex;align-items:baseline;gap:6px}
.hero-num{font-size:72px;font-weight:900;line-height:.88;letter-spacing:-.04em;color:var(--text);white-space:nowrap;overflow:hidden}
.hero-num .unit{font-size:18px;font-weight:600;color:var(--text-2);letter-spacing:0}
.hero-target{font-size:13px;color:var(--text-3);margin-top:6px;font-weight:500}
.hero-target span{color:var(--text-2);font-weight:700}
.kcal-bar{height:6px;border-radius:3px;background:rgba(0,0,0,.06);margin-top:14px;overflow:hidden}
.kcal-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--peach));transition:width .6s cubic-bezier(.34,1.2,.64,1)}

/* ── Day Type Badge ── */
.day-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(16px);color:var(--text-2);margin-bottom:12px;cursor:pointer}
.day-badge.active-blue{background:linear-gradient(135deg,rgba(168,197,232,.6),rgba(168,197,232,.3));color:var(--blue-deep)}
.day-badge.active-peach{background:linear-gradient(135deg,rgba(240,168,136,.6),rgba(240,168,136,.3));color:var(--peach-deep)}

/* ── Macro Pills ── */
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.macro-pill{padding:12px 10px;border-radius:var(--r);text-align:center}
.macro-pill-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.macro-pill-val{font-size:22px;font-weight:900;letter-spacing:-.03em;color:var(--text);line-height:1}
.macro-pill-target{font-size:10px;color:var(--text-3);margin-top:2px;font-weight:500}
.macro-bar{height:3px;border-radius:2px;background:rgba(0,0,0,.06);margin-top:6px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}
.macro-pill.p .macro-bar-fill{background:linear-gradient(90deg,#74B9FF,#A8C5E8)}
.macro-pill.c .macro-bar-fill{background:linear-gradient(90deg,#F9C74F,#F8A948)}
.macro-pill.f .macro-bar-fill{background:linear-gradient(90deg,#F0A888,#E07848)}

/* ── Section Header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 4px 8px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
.section-action{font-size:12px;font-weight:600;color:var(--blue-deep);padding:4px 0;cursor:pointer}

/* ── Meal Cards ── */
.meal-card{padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.meal-card:active{transform:scale(.98)}
.meal-thumb{width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,rgba(168,197,232,.3),rgba(240,168,136,.2))}
.meal-thumb-placeholder{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(168,197,232,.3),rgba(240,168,136,.2));display:flex;align-items:center;justify-content:center;font-size:20px}
.meal-info{flex:1;min-width:0}
.meal-type{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}
.meal-desc{font-size:14px;font-weight:600;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meal-kcal{font-size:20px;font-weight:900;letter-spacing:-.03em;color:var(--text);flex-shrink:0;line-height:1}
.meal-kcal span{font-size:10px;font-weight:600;color:var(--text-3)}

/* ── Exercise Selector ── */
.exercise-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.ex-btn{padding:10px 12px;border-radius:14px;border:1.5px solid rgba(0,0,0,.07);background:var(--glass);backdrop-filter:blur(12px);font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.ex-btn:active{transform:scale(.96)}
.ex-btn.selected{border-color:var(--blue-deep);background:linear-gradient(135deg,rgba(168,197,232,.5),rgba(168,197,232,.2));color:var(--blue-deep)}

/* ── Workout View ── */
.workout-hero{padding:24px 20px;margin:8px 0 12px;position:relative;overflow:hidden}
.workout-hero::before{content:'';position:absolute;bottom:-20px;left:-20px;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,rgba(240,168,136,.3),rgba(168,197,232,.2));filter:blur(25px)}
.workout-day-label{font-size:28px;font-weight:900;letter-spacing:-.03em;color:var(--text);margin-bottom:4px}
.workout-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.06em}
.badge-week{background:rgba(168,197,232,.25);color:var(--blue-deep)}
.badge-phase{background:rgba(240,168,136,.25);color:var(--peach-deep)}
.badge-rest{background:rgba(0,0,0,.06);color:var(--text-3)}

.warmup-card{padding:14px 16px;margin-bottom:8px}
.warmup-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.warmup-item{font-size:13px;color:var(--text-2);padding:3px 0;display:flex;align-items:center;gap:8px}
.warmup-item::before{content:'›';color:var(--blue-deep);font-weight:700}

.exercise-card{padding:16px;margin-bottom:10px;border-left:3px solid var(--blue)}
.exercise-card.logged{border-left-color:var(--peach)}
.ex-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.ex-planned{font-size:13px;font-weight:600;color:var(--peach-deep);margin-top:2px}
.ex-note{font-size:11px;color:var(--text-3);margin-top:2px}
.ex-log-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.ex-log-row input{width:100%;padding:10px 8px;border-radius:10px;border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.6);font-size:14px;font-weight:700;color:var(--text);text-align:center;font-family:inherit;-webkit-appearance:none}
.ex-log-row input:focus{outline:none;border-color:var(--blue-deep);background:rgba(255,255,255,.9)}
.ex-log-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:center;margin-top:4px}
.feeling-row{display:flex;gap:6px;margin-top:10px;align-items:center}
.feeling-label{font-size:11px;color:var(--text-3);font-weight:600;flex-shrink:0}
.feeling-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.5);font-size:14px;cursor:pointer;transition:all .15s}
.feeling-btn.active{background:linear-gradient(135deg,var(--peach),var(--blue));border-color:transparent;transform:scale(1.1)}
.log-btn{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue-deep),var(--blue));color:#fff;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;font-family:inherit;transition:opacity .15s}
.log-btn:active{opacity:.8}
.log-btn.done{background:linear-gradient(135deg,var(--peach-deep),var(--peach))}

/* ── Weekly View ── */
.weekly-hero{padding:24px 20px;margin:8px 0 12px;text-align:center;position:relative;overflow:hidden}
.weekly-big-num{font-size:64px;font-weight:900;letter-spacing:-.05em;line-height:.9}
.weekly-big-num.surplus{color:var(--peach-deep)}
.weekly-big-num.deficit{color:var(--blue-deep)}
.weekly-big-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-top:6px}
.weekly-fat{font-size:16px;font-weight:800;color:var(--text);margin-top:10px}
.weekly-fat span{color:var(--blue-deep)}
.weekly-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin:8px 0}
.weekly-nav button{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,0,0,.08);background:var(--glass);backdrop-filter:blur(12px);cursor:pointer;font-size:16px;color:var(--text-2)}
.weekly-nav span{font-size:13px;font-weight:700;color:var(--text-2)}

.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-strip-item{padding:10px 4px;border-radius:14px;text-align:center;background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;transition:transform .15s}
.day-strip-item:active{transform:scale(.95)}
.day-strip-item.has-data{background:linear-gradient(180deg,rgba(168,197,232,.3),rgba(240,168,136,.2))}
.day-strip-dow{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--text-3);text-transform:uppercase}
.day-strip-kcal{font-size:14px;font-weight:900;color:var(--text);margin-top:2px;letter-spacing:-.02em}
.day-strip-kcal.empty{font-size:10px;color:var(--text-3)}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-card{padding:16px;border-radius:20px}

/* ── Weekly Day List ── */
.week-section-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin:16px 0 8px 4px}
.week-day-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.week-day-card{padding:14px 16px;border-radius:18px;background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;transition:transform .15s}
.week-day-card:active{transform:scale(.98)}
.week-day-card.no-data{opacity:.5}
.week-day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.week-day-dow-badge{font-size:11px;font-weight:800;width:30px;height:30px;border-radius:50%;background:rgba(168,197,232,.3);display:flex;align-items:center;justify-content:center;color:var(--blue-deep);flex-shrink:0}
.week-day-date-str{font-size:11px;color:var(--text-3);font-weight:600}
.week-day-exbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:auto}
.week-day-exbadge.training{background:rgba(240,168,136,.25);color:var(--peach-deep)}
.week-day-exbadge.cardio{background:rgba(168,197,232,.3);color:var(--blue-deep)}
.week-day-exbadge.rest{background:rgba(0,0,0,.06);color:var(--text-3)}
.week-day-kcal-row{display:flex;align-items:baseline;gap:5px}
.week-day-kcal-eaten{font-size:22px;font-weight:900;letter-spacing:-.04em;color:var(--text)}
.week-day-kcal-sep{font-size:11px;color:var(--text-3)}
.week-day-kcal-target{font-size:13px;font-weight:700;color:var(--text-3)}
.week-day-macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.week-day-macro{text-align:center;padding:6px 4px;border-radius:10px;background:rgba(0,0,0,.03)}
.week-day-macro-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}
.week-day-macro-val{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-top:1px}
.week-day-no-data-label{font-size:12px;color:var(--text-3);font-weight:600}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.stat-val{font-size:30px;font-weight:900;letter-spacing:-.04em;color:var(--text)}
.stat-val.blue{color:var(--blue-deep)}
.stat-val.peach{color:var(--peach-deep)}

/* ── Bottom Nav ── */
#bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  padding:0 24px calc(var(--safe-b) + 8px);
  z-index:100;
}
.nav-pill{
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,.9);
  border-radius:999px;
  box-shadow:0 8px 32px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
  padding:10px 8px;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 20px;border-radius:999px;border:none;background:transparent;
  cursor:pointer;font-family:inherit;transition:all .2s;min-width:72px;
}
.nav-btn.active{background:linear-gradient(135deg,rgba(168,197,232,.5),rgba(240,168,136,.35))}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text-3);text-transform:uppercase;transition:color .2s}
.nav-btn.active .nav-label{color:var(--text)}

/* ── Suggest Button ── */
.suggest-btn{
  width:100%;margin:12px 0 0;padding:13px 16px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,var(--blue-deep),var(--blue));
  color:#fff;font-size:13px;font-weight:700;letter-spacing:.06em;
  cursor:pointer;font-family:inherit;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.suggest-btn:active{opacity:.8}
.suggest-btn:disabled{opacity:.5;cursor:not-allowed}
.suggest-result{
  margin-top:10px;padding:14px 16px;background:var(--glass);border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);border-radius:var(--r);font-size:13px;line-height:1.7;
  color:var(--text);white-space:pre-wrap;display:none;
}

/* ── FAB ── */
#fab{
  position:fixed;right:24px;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--peach),var(--peach-deep));
  color:#fff;font-size:26px;line-height:1;
  box-shadow:0 8px 24px rgba(224,120,72,.45);
  cursor:pointer;z-index:99;transition:transform .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;
}
#fab:active{transform:scale(.9);box-shadow:0 4px 16px rgba(224,120,72,.35)}
#fab.hidden{display:none}

/* ── Modal / Drawer ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:none;align-items:flex-end}
.overlay.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{
  width:100%;max-width:480px;margin:0 auto;
  background:rgba(250,248,244,.96);backdrop-filter:blur(32px);
  border-radius:28px 28px 0 0;
  padding:0 20px calc(var(--safe-b) + 20px);
  max-height:90vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.32,1.2,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.drawer-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:12px auto 20px}
.drawer-title{font-size:20px;font-weight:900;letter-spacing:-.02em;color:var(--text);margin-bottom:20px}

/* ── Form Elements ── */
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:14px 16px;border-radius:14px;
  border:1.5px solid rgba(0,0,0,.08);
  background:rgba(255,255,255,.65);
  font-size:15px;font-weight:500;color:var(--text);
  font-family:inherit;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--blue-deep);background:rgba(255,255,255,.9);
}
.field textarea{resize:none;min-height:72px}

.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.macro-grid .field{margin:0}
.macro-grid .field input{padding:12px 8px;text-align:center}

.meal-types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.meal-type-btn{padding:10px 6px;border-radius:12px;border:1.5px solid rgba(0,0,0,.07);background:rgba(255,255,255,.5);font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.meal-type-btn:active{transform:scale(.95)}
.meal-type-btn.selected{border-color:var(--peach-deep);background:linear-gradient(135deg,rgba(240,168,136,.4),rgba(240,168,136,.2));color:var(--peach-deep)}

/* ── Upload Area ── */
.upload-area{
  border:2px dashed rgba(0,0,0,.1);border-radius:var(--r-lg);
  padding:28px 16px;text-align:center;margin-bottom:14px;
  cursor:pointer;background:rgba(255,255,255,.3);
  transition:all .2s;position:relative;overflow:hidden;
}
.upload-area:active{background:rgba(255,255,255,.6)}
.upload-area.has-img{border-style:solid;border-color:var(--glass-border)}
.upload-area img{width:100%;border-radius:14px;display:block}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;font-weight:600;color:var(--text-3)}
.upload-text span{color:var(--blue-deep)}
#imageInput{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ai-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:linear-gradient(135deg,rgba(168,197,232,.5),rgba(240,168,136,.4));font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px}

/* ── Submit Button ── */
.btn-submit{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--blue-deep),var(--peach));
  color:#fff;font-size:15px;font-weight:800;letter-spacing:.04em;
  cursor:pointer;font-family:inherit;transition:opacity .15s;
  box-shadow:0 8px 24px rgba(111,168,212,.35);
}
.btn-submit:active{opacity:.85}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* ── Loading ── */
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(26,24,20,.88);backdrop-filter:blur(16px);
  color:#fff;padding:10px 20px;border-radius:999px;
  font-size:13px;font-weight:600;z-index:999;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Empty State ── */
.empty-state{text-align:center;padding:32px 0;color:var(--text-3)}
.empty-state .emoji{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:13px;font-weight:500}

/* ── Rest Day ── */
.rest-card{padding:32px 20px;text-align:center;margin:8px 0}
.rest-emoji{font-size:52px;margin-bottom:8px}
.rest-title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.02em;margin-bottom:6px}
.rest-sub{font-size:14px;color:var(--text-3);font-weight:500}

/* ── Countdown ── */
.countdown-card{padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.countdown-num{font-size:42px;font-weight:900;letter-spacing:-.05em;color:var(--peach-deep);line-height:1}
.countdown-text{font-size:13px;color:var(--text-2);font-weight:600;line-height:1.4}
.countdown-text strong{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:2px}

/* ── Milestone Timeline ── */
.ms-card{padding:18px 20px;margin-bottom:10px}
.ms-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.ms-track{position:relative;display:flex;justify-content:space-between;align-items:flex-start;padding-top:4px}
.ms-line-bg{position:absolute;top:9px;left:10px;right:10px;height:2px;background:rgba(0,0,0,.06);border-radius:1px}
.ms-line-fill{position:absolute;top:9px;left:10px;height:2px;background:linear-gradient(90deg,var(--blue-deep),var(--peach));border-radius:1px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}
.ms-dot{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;width:72px}
.ms-circle{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,.10);background:#fff;z-index:1;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;flex-shrink:0}
.ms-circle.ms-done{background:linear-gradient(135deg,var(--blue-deep),var(--blue));border-color:var(--blue-deep)}
.ms-circle.ms-active{background:linear-gradient(135deg,var(--peach-deep),var(--peach));border-color:var(--peach-deep);box-shadow:0 0 0 4px rgba(240,168,136,.25)}
.ms-label{font-size:9px;font-weight:700;color:var(--text-2);text-align:center;line-height:1.3;max-width:70px}
.ms-bf{font-size:11px;font-weight:900;color:var(--text);margin-top:1px}
.ms-days-left{font-size:11px;font-weight:700;color:var(--peach-deep);margin-top:2px;text-align:center}
</style>
</head>
<body>
<div id="app">
  <!-- ── SCROLL AREA ── -->
  <div id="scroll-area">

    <!-- ══════════ VIEW: 飲食 ══════════ -->
    <div id="view-food" class="view active">
      <div class="page-header">
        <div>
          <div id="food-date-display" class="date-display"></div>
          <div id="food-date-sub" class="date-sub"></div>
        </div>
        <div class="date-nav">
          <button onclick="changeDate(-1)">‹</button>
          <button onclick="changeDate(1)">›</button>
        </div>
      </div>

      <!-- Day type selector → opens drawer -->
      <div style="padding:0 0 0">
        <div id="day-badge" class="day-badge" onclick="openExerciseDrawer()">
          <span id="day-badge-text">選擇今日運動</span>
          <span>›</span>
        </div>
      </div>

      <!-- Hero calorie card -->
      <div class="card hero-card">
        <div class="hero-label">今日攝取</div>
        <div class="hero-kcal">
          <div class="hero-num"><span id="kcal-eaten">0</span> <span class="unit">kcal</span></div>
        </div>
        <div id="kcal-target-text" class="hero-target">目標 <span>—</span></div>
        <div class="kcal-bar"><div id="kcal-bar-fill" class="kcal-bar-fill" style="width:0%"></div></div>
      </div>

      <!-- Macro pills -->
      <div class="macro-row">
        <div class="card macro-pill p">
          <div class="macro-pill-label">蛋白質</div>
          <div class="macro-pill-val"><span id="p-val">0</span></div>
          <div id="p-target" class="macro-pill-target">/ — g</div>
          <div class="macro-bar"><div id="p-bar" class="macro-bar-fill" style="width:0%"></div></div>
        </div>
        <div class="card macro-pill c">
          <div class="macro-pill-label">碳水</div>
          <div class="macro-pill-val"><span id="c-val">0</span></div>
          <div id="c-target" class="macro-pill-target">/ — g</div>
          <div class="macro-bar"><div id="c-bar" class="macro-bar-fill" style="width:0%"></div></div>
        </div>
        <div class="card macro-pill f">
          <div class="macro-pill-label">脂肪</div>
          <div class="macro-pill-val"><span id="f-val">0</span></div>
          <div id="f-target" class="macro-pill-target">/ — g</div>
          <div class="macro-bar"><div id="f-bar" class="macro-bar-fill" style="width:0%"></div></div>
        </div>
      </div>

      <!-- Suggest button -->
      <button class="suggest-btn" id="suggest-btn" onclick="getSuggestion()">💡 還能吃什麼？</button>
      <div class="suggest-result" id="suggest-result"></div>

      <!-- Meals list -->
      <div class="section-header">
        <span class="section-title">飲食記錄</span>
      </div>
      <div id="meals-list"></div>
    </div>

    <!-- ══════════ VIEW: 訓練 ══════════ -->
    <div id="view-workout" class="view">
      <div class="page-header">
        <div>
          <div class="date-display">訓練記錄</div>
          <div id="workout-date-sub" class="date-sub"></div>
        </div>
        <div id="countdown-mini" style="text-align:right">
          <div style="font-size:26px;font-weight:900;color:var(--peach-deep);letter-spacing:-.04em" id="days-left-num">—</div>
          <div style="font-size:10px;color:var(--text-3);font-weight:700;letter-spacing:.1em;text-transform:uppercase" id="days-left-label">距目標</div>
        </div>
      </div>

      <div id="workout-content"></div>
    </div>

    <!-- ══════════ VIEW: 週報 ══════════ -->
    <div id="view-weekly" class="view">
      <div class="page-header">
        <div>
          <div class="date-display">週報</div>
        </div>
      </div>
      <div id="weekly-content"></div>
    </div>

  </div>

  <!-- ── FAB ── -->
  <button id="fab" onclick="openAddMeal()">＋</button>

  <!-- ── Bottom Nav ── -->
  <div id="bottom-nav">
    <div class="nav-pill">
      <button class="nav-btn active" onclick="switchView('food',this)">
        <span class="nav-icon">🥗</span><span class="nav-label">飲食</span>
      </button>
      <button class="nav-btn" onclick="switchView('workout',this)">
        <span class="nav-icon">🏋️</span><span class="nav-label">訓練</span>
      </button>
      <button class="nav-btn" onclick="switchView('weekly',this)">
        <span class="nav-icon">📊</span><span class="nav-label">週報</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Add Meal Drawer ── -->
<div id="overlay-meal" class="overlay" onclick="closeDrawer('meal')">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">新增飲食</div>

    <!-- 圖片預覽區（無 input） -->
    <div id="upload-area" class="upload-area" style="cursor:default">
      <div id="upload-placeholder">
        <div class="upload-icon">🍽️</div>
        <div class="upload-text" style="color:var(--text-3)">拍照或選圖片自動辨識熱量</div>
      </div>
    </div>
    <!-- 兩個獨立按鈕 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;position:relative">
      <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;border:1.5px solid rgba(0,0,0,.08);background:linear-gradient(135deg,rgba(168,197,232,.3),rgba(168,197,232,.1));font-size:13px;font-weight:700;color:var(--blue-deep);cursor:pointer">
        📷 拍照
        <input type="file" accept="image/*" capture="environment" onchange="handleImage(event)" style="position:absolute;opacity:0;width:0;height:0">
      </label>
      <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;border:1.5px solid rgba(0,0,0,.08);background:linear-gradient(135deg,rgba(240,168,136,.3),rgba(240,168,136,.1));font-size:13px;font-weight:700;color:var(--peach-deep);cursor:pointer">
        🖼️ 相簿
        <input type="file" accept="image/*" onchange="handleImage(event)" style="position:absolute;opacity:0;width:0;height:0">
      </label>
    </div>

    <div id="ai-status" style="display:none;text-align:center;margin-bottom:12px">
      <span class="ai-badge"><span class="spinner"></span>AI 辨識中...</span>
    </div>

    <div class="meal-types" id="meal-types"></div>

    <div class="field">
      <div class="field-label">食物描述</div>
      <textarea id="meal-desc" rows="2" placeholder="例：雞胸肉沙拉、全麥吐司..."></textarea>
    </div>

    <div class="macro-grid">
      <div class="field">
        <div class="field-label">熱量</div>
        <input type="number" id="meal-kcal" placeholder="kcal" inputmode="decimal">
      </div>
      <div class="field">
        <div class="field-label">蛋白質 g</div>
        <input type="number" id="meal-p" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <div class="field-label">碳水 g</div>
        <input type="number" id="meal-c" placeholder="0" inputmode="decimal">
      </div>
    </div>
    <div class="macro-grid">
      <div class="field">
        <div class="field-label">脂肪 g</div>
        <input type="number" id="meal-f" placeholder="0" inputmode="decimal">
      </div>
      <div class="field" style="grid-column:span 2"></div>
    </div>

    <input type="hidden" id="meal-img-b64">
    <input type="hidden" id="meal-img-mime">

    <button class="btn-submit" id="submit-meal-btn" onclick="submitMeal()">儲存</button>
  </div>
</div>

<!-- ── Exercise Drawer ── -->
<div id="overlay-exercise" class="overlay" onclick="closeDrawer('exercise')">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">今日運動</div>
    <div id="exercise-drawer-grid" class="exercise-grid"></div>
  </div>
</div>

<!-- ── Aerobic Drawer ── -->
<div id="overlay-aerobic" class="overlay" onclick="closeDrawer('aerobic')">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">記錄有氧運動</div>
    <div class="field">
      <div class="field-label">運動類型</div>
      <select id="aerobic-activity">
        <option>飛輪</option>
        <option>跑步 Zone 2</option>
        <option>30分鐘滑步機</option>
        <option>快走</option>
        <option>游泳</option>
        <option>其他有氧</option>
      </select>
    </div>
    <div class="field">
      <div class="field-label">時間（分鐘）</div>
      <input type="number" id="aerobic-minutes" placeholder="例：45" inputmode="numeric"
        style="font-size:32px;font-weight:900;text-align:center;letter-spacing:-.03em">
    </div>
    <button class="btn-submit" id="submit-aerobic-btn" onclick="submitAerobic()">記錄</button>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
// ╔══════════════════════════════════════╗
// ║  Client-side JS                      ║
// ╚══════════════════════════════════════╝

// ── State ──
let state = {
  currentDate: todayStr(),
  foodData: null,
  workoutData: null,
  weeklyData: null,
  weekOffset: 0,
  selectedMealType: '午餐',
  pendingImgB64: '',
  pendingImgMime: '',
  workoutLog: {},
  selectedFeelings: {},
  openPlan: null,
  aerobicData: null,
};

const MEAL_TYPES   = ['早餐','午餐','下午點心','晚餐','宵夜'];
const WEEKDAY_CN   = ['日','一','二','三','四','五','六'];
const PHASE_LABEL  = { m1:'第一個月', m2:'第二個月', m3:'第三個月' };

// ── 人生里程碑（同步自 Code.gs）──
const MILESTONES = [
  { date: '2026-03-24', label: '計畫啟動',     icon: '🚀', bf: 30, note: 'W1 開始' },
  { date: '2026-04-29', label: '泰國出發',     icon: '✈️', bf: 29, note: 'Phase 1 中' },
  { date: '2026-05-18', label: 'Phase 1 完成', icon: '🟢', bf: 28, note: 'W8 結束' },
  { date: '2026-07-13', label: 'Phase 2 完成', icon: '🟡', bf: 25, note: 'W16 結束' },
  { date: '2026-09-07', label: '最終目標',     icon: '🏆', bf: 22, note: 'W24 完成' },
];

function getActiveMilestoneIdx() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < MILESTONES.length; i++) {
    if (new Date(MILESTONES[i].date + 'T00:00:00') >= today) return i;
  }
  return MILESTONES.length - 1;
}

function renderMilestoneCard() {
  const today = new Date(); today.setHours(0,0,0,0);
  const activeIdx = getActiveMilestoneIdx();
  const active = MILESTONES[activeIdx];
  const start  = new Date(MILESTONES[0].date + 'T00:00:00');
  const end    = new Date(MILESTONES[MILESTONES.length - 1].date + 'T00:00:00');
  const totalMs = end - start;
  const elapsedMs = Math.min(Math.max(today - start, 0), totalMs);
  const pct = totalMs > 0 ? (elapsedMs / totalMs * 100).toFixed(1) : 0;

  // Update header countdown
  const msDate = new Date(active.date + 'T00:00:00');
  const daysLeft = Math.max(0, Math.ceil((msDate - today) / 86400000));
  document.getElementById('days-left-num').textContent = daysLeft;
  document.getElementById('days-left-label').textContent = active.label + '前';

  const dotsHtml = MILESTONES.map((ms, i) => {
    const msDate = new Date(ms.date + 'T00:00:00');
    const isPast   = msDate < today;
    const isActive = i === activeIdx;
    const cls = isPast ? 'ms-done' : (isActive ? 'ms-active' : '');
    const daysToThis = Math.ceil((msDate - today) / 86400000);
    const daysLabel  = isPast ? '已達成 ✓' : (isActive ? `${daysToThis}天後` : `${daysToThis}天後`);
    return `<div class="ms-dot">
      <div class="ms-circle ${cls}">${ms.icon}</div>
      <div class="ms-label">${ms.label}</div>
      <div class="ms-bf">體脂 ${ms.bf}%</div>
      <div class="ms-days-left" style="${isPast ? 'color:var(--blue-deep)' : ''}">${daysLabel}</div>
    </div>`;
  }).join('');

  return `<div class="card ms-card">
    <div class="ms-title">🎯 人生里程碑 · 最終目標 體脂 ${MILESTONES[MILESTONES.length-1].bf}%</div>
    <div class="ms-track">
      <div class="ms-line-bg"></div>
      <div class="ms-line-fill" style="width:calc(${pct}% - 20px)"></div>
      ${dotsHtml}
    </div>
  </div>`;
}

// ── Date Helpers ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateDisplay(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function formatWeekday(ds) {
  const d = new Date(ds + 'T00:00:00');
  return '週' + WEEKDAY_CN[d.getDay()];
}
function addDays(ds, n) {
  const d = new Date(ds + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

// ── View Switching ──
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fab').classList.toggle('hidden', name !== 'food');

  if (name === 'workout' && !state.workoutData) loadWorkout();
  if (name === 'weekly' && !state.weeklyData) loadWeekly();
}

// ── Food View ──
function loadFood(dateStr) {
  dateStr = dateStr || state.currentDate;
  state.currentDate = dateStr;

  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('food-date-display').textContent = formatDateDisplay(dateStr);
  document.getElementById('food-date-sub').textContent = formatWeekday(dateStr) + (dateStr === todayStr() ? ' · 今天' : '');

  google.script.run
    .withSuccessHandler(data => { state.foodData = data; renderFood(data); })
    .withFailureHandler(e => showToast('載入失敗：' + e.message))
    .getPageData(dateStr);
}

function renderFood(data) {
  // Day badge
  const badge = document.getElementById('day-badge');
  const badgeText = document.getElementById('day-badge-text');
  if (data.exercise) {
    badgeText.textContent = data.exercise + (data.dayType ? ' · ' + data.dayType : '');
    badge.className = 'day-badge ' + (data.dayType === '重訓日' ? 'active-blue' : data.dayType === '有氧日' ? 'active-peach' : '');
  } else {
    badgeText.textContent = '選擇今日運動 ›';
    badge.className = 'day-badge';
  }

  // Macros
  const t = data.totals, tg = data.target;
  document.getElementById('kcal-eaten').textContent = Math.round(t.kcal);
  document.getElementById('p-val').textContent = Math.round(t.p);
  document.getElementById('c-val').textContent = Math.round(t.c);
  document.getElementById('f-val').textContent = Math.round(t.f);

  if (tg) {
    document.getElementById('kcal-target-text').innerHTML = `目標 <span>${tg.kcal} kcal · ${tg.label}</span>`;
    document.getElementById('kcal-bar-fill').style.width = Math.min(100, (t.kcal / tg.kcal) * 100) + '%';
    document.getElementById('p-target').textContent = `/ ${tg.p}g`;
    document.getElementById('c-target').textContent = `/ ${tg.c}g`;
    document.getElementById('f-target').textContent = `/ ${tg.f}g`;
    document.getElementById('p-bar').style.width = Math.min(100, (t.p / tg.p) * 100) + '%';
    document.getElementById('c-bar').style.width = Math.min(100, (t.c / tg.c) * 100) + '%';
    document.getElementById('f-bar').style.width = Math.min(100, (t.f / tg.f) * 100) + '%';
  } else {
    document.getElementById('kcal-target-text').innerHTML = '目標 <span>請選擇運動類型</span>';
    document.getElementById('kcal-bar-fill').style.width = '0%';
  }

  // Meals list
  const list = document.getElementById('meals-list');
  if (!data.meals || data.meals.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🍽️</div><p>還沒有飲食記錄<br>點右下角 ＋ 新增</p></div>`;
    return;
  }
  list.innerHTML = data.meals.map(m => {
    const imgHtml = m.image_url
      ? `<img class="meal-thumb" src="${m.image_url}" loading="lazy">`
      : `<div class="meal-thumb-placeholder">${mealEmoji(m.meal_type)}</div>`;
    return `<div class="card meal-card" data-action="delete-meal" data-id="${m.id}" data-desc="${encodeURIComponent(m.description||'')}">
      ${imgHtml}
      <div class="meal-info">
        <div class="meal-type">${m.meal_type || '飲食'}</div>
        <div class="meal-desc">${m.description || '—'}</div>
      </div>
      <div class="meal-kcal">${Math.round(m.calories||0)}<span> kcal</span></div>
    </div>`;
  }).join('');
}

function mealEmoji(type) {

function openAddMeal() {

}

function closeDrawer(name) {

function resetMealForm() {
  document.getElementById('meal-desc').value = '';
  document.getElementById('meal-kcal').value = '';
  document.getElementById('meal-p').value = '';
  document.getElementById('meal-c').value = '';
  document.getElementById('meal-f').value = '';
  document.getElementById('meal-img-b64').value = '';
  document.getElementById('meal-img-mime').value = '';
  state.pendingImgB64 = '';
  const ua = document.getElementById('upload-area');
  ua.classList.remove('has-img');
  document.getElementById('upload-placeholder').style.display = 'block';
  const prevImg = ua.querySelector('img.preview');
  if (prevImg) prevImg.remove();
  document.getElementById('ai-status').style.display = 'none';

  document.querySelectorAll('#overlay-meal input[type=file]').forEach(i => i.value = '');

function selectMealType(t, btn) {
  state.selectedMealType = t;
  document.querySelectorAll('.meal-type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function handleImage(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const b64full = e.target.result;
    const comma = b64full.indexOf(',');
    state.pendingImgB64 = b64full.slice(comma + 1);
    state.pendingImgMime = file.type || 'image/jpeg';

    // Preview
    const ua = document.getElementById('upload-area');
    ua.classList.add('has-img');
    document.getElementById('upload-placeholder').style.display = 'none';
    const prevImg = ua.querySelector('img.preview');
    if (prevImg) prevImg.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    img.className = 'preview';
    ua.appendChild(img);

    // AI analyze
    document.getElementById('ai-status').style.display = 'block';
    google.script.run
      .withSuccessHandler(result => {
        document.getElementById('ai-status').style.display = 'none';
        if (result.description && !result.description.includes('失敗')) {
          document.getElementById('meal-desc').value = result.description;
          document.getElementById('meal-kcal').value = result.calories || '';
          document.getElementById('meal-p').value   = result.protein   || '';
          document.getElementById('meal-c').value   = result.carbs     || '';
          document.getElementById('meal-f').value   = result.fat       || '';
          showToast('✨ AI 辨識完成！');
        } else {
          showToast('AI 辨識失敗，請手動輸入');
        }
      })
      .withFailureHandler(() => {
        document.getElementById('ai-status').style.display = 'none';
        showToast('AI 暫時無法使用，請手動輸入');
      })
      .analyzeFood(state.pendingImgB64, state.pendingImgMime);
  };
  reader.readAsDataURL(file);
}

function submitMeal() {
  const desc = document.getElementById('meal-desc').value.trim();
  const kcal = document.getElementById('meal-kcal').value;
  if (!desc && !kcal) { showToast('請輸入食物或熱量'); return; }

  const btn = document.getElementById('submit-meal-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>儲存中...';

  const mealData = {
    date:        state.currentDate,
    meal_type:   state.selectedMealType,
    description: desc,
    calories:    kcal   || 0,
    protein:     document.getElementById('meal-p').value || 0,
    carbs:       document.getElementById('meal-c').value || 0,
    fat:         document.getElementById('meal-f').value || 0,
    image_b64:   state.pendingImgB64,
    image_mime:  state.pendingImgMime,
  };

  // Upload image first if present, then add meal
  if (state.pendingImgB64) {
    google.script.run
      .withSuccessHandler(res => {
        mealData.image_url = res.url || '';
        mealData.image_b64 = '';
        saveMealToSheet(mealData, btn);
      })
      .withFailureHandler(() => {
        mealData.image_url = '';
        saveMealToSheet(mealData, btn);
      })
      .uploadImage(state.pendingImgB64, state.pendingImgMime,
        `meal_${state.currentDate}_${Date.now()}.jpg`);
  } else {
    mealData.image_url = '';
    saveMealToSheet(mealData, btn);
  }
}

function saveMealToSheet(mealData, btn) {
  google.script.run
    .withSuccessHandler(() => {
      btn.disabled = false;
      btn.textContent = '儲存';
      closeDrawer('meal');
      loadFood(state.currentDate);
      showToast('已記錄！');
    })
    .withFailureHandler(e => {
      btn.disabled = false;
      btn.textContent = '儲存';
      showToast('儲存失敗：' + e.message);
    })
    .addMeal(mealData);
}

function confirmDelete(mealId, desc) {
  if (!confirm(`刪除「${desc}」？`)) return;
  google.script.run
    .withSuccessHandler(() => { loadFood(state.currentDate); showToast('已刪除'); })
    .withFailureHandler(e => showToast('錯誤：' + e.message))
    .deleteMeal(mealId);
}

// ── Workout View ──
function loadWorkout() {
  const dateStr = todayStr();
  document.getElementById('workout-date-sub').textContent = formatDateDisplay(dateStr) + ' ' + formatWeekday(dateStr);

  google.script.run
    .withSuccessHandler(data => {
      state.workoutData = data;
      // Load week log + aerobic in parallel
      google.script.run
        .withSuccessHandler(logs => {
          state.workoutLog = {};
          logs.forEach(r => {
            if (!state.workoutLog[r.day_label]) state.workoutLog[r.day_label] = {};
            state.workoutLog[r.day_label][r.exercise] = r;
          });
          google.script.run
            .withSuccessHandler(aerobic => { state.aerobicData = aerobic; renderWorkout(data); })
            .withFailureHandler(() => { state.aerobicData = null; renderWorkout(data); })
            .getWeeklyAerobic(dateStr);
        })
        .withFailureHandler(() => renderWorkout(data))
        .getWeekWorkoutLog(dateStr);
    })
    .withFailureHandler(e => {
      document.getElementById('workout-content').innerHTML =
        `<div class="card rest-card"><p style="color:var(--text-3)">${e.message}</p></div>`;
    })
    .getWeekWorkoutPlan(dateStr);
}

  const el = document.getElementById('workout-content');

    el.innerHTML = `<div class="card rest-card"><div class="rest-emoji">📅</div><div class="rest-title">訓練週期尚未開始</div></div>`;
    return;
  }

  const wi       = data.weekInfo;

  const aerobic  = state.aerobicData;

  // ── 里程碑卡片 ──
  let html = renderMilestoneCard();

  // ── 週頭資訊 ──
  html += `
    <div class="card workout-hero">
      <div class="workout-day-label">本週訓練</div>
      <div class="workout-badges">

        <span class="badge badge-phase">${phaseLbl}</span>
      </div>
    </div>`;

  // ── 有氧 240 分鐘目標 ──

    const pct = aerobic.pct;

    html += `
      <div class="card" style="padding:18px 20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)">有氧目標</div>
            <div style="display:flex;align-items:baseline;gap:4px;margin-top:2px">
              <span style="font-size:36px;font-weight:900;letter-spacing:-.04em;color:${done ? 'var(--peach-deep)' : 'var(--blue-deep)'}">${aerobic.total}</span>
              <span style="font-size:13px;font-weight:600;color:var(--text-3)">/ ${aerobic.goal} 分鐘</span>
            </div>
          </div>
          <div style="text-align:center">
            <div style="font-size:28px;font-weight:900;letter-spacing:-.04em;color:${done ? 'var(--peach-deep)' : 'var(--text)'}">${pct}%</div>
            <div style="font-size:10px;color:var(--text-3);font-weight:600">${done ? '🎉 達成！' : `還差 ${aerobic.rem} 分`}</div>
          </div>
        </div>
        <div style="height:8px;border-radius:4px;background:rgba(0,0,0,.06);overflow:hidden">

        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="log-btn" style="flex:1;margin:0" data-action="aerobic-log">＋ 記錄有氧</button>
        </div>
        ${aerobic.logs.length > 0 ? `
        <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">
          ${aerobic.logs.map(l => `
            <span style="background:rgba(168,197,232,.2);padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;color:var(--blue-deep);cursor:pointer"
              data-action="aerobic-del" data-id="${l.id}">${l.activity || '有氧'} ${l.minutes}分</span>
          `).join('')}
        </div>` : ''}
      </div>`;
  }

  // ── 三個訓練卡 ──
  data.plans.forEach((plan, pi) => {
    const planLog = state.workoutLog[plan.label] || {};
    const doneCount = plan.exercises.filter(ex => planLog[ex.name]).length;
    const isAllDone = doneCount === plan.exercises.length;
    const isOpen = state.openPlan === plan.key;

    html += `
      <div class="card" style="margin-bottom:10px;overflow:hidden">
        <div style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer"
          data-action="toggle-plan" data-key="${plan.key}">
          <div>
            <div style="font-size:17px;font-weight:900;letter-spacing:-.02em;color:var(--text)">${plan.label}</div>
            <div style="font-size:11px;color:var(--text-3);margin-top:2px;font-weight:600">
              ${isAllDone ? '✅ 本週已完成' : `${doneCount}/${plan.exercises.length} 已記錄`}
            </div>
          </div>

                      <span class="feeling-label">感受：</span>
                      ${[1,2,3,4,5].map(n => `<button class="feeling-btn" id="feel-${logKey}-${n}" data-action="feeling" data-key="${logKey}" data-n="${n}">${['😵','😤','💪','🔥','⚡'][n-1]}</button>`).join('')}
                    </div>

                }
              </div>`;
          }).join('')}
        </div>
      </div>`;
  });

  el.innerHTML = html;

function togglePlan(key) {
  state.openPlan = state.openPlan === key ? null : key;

function setFeeling(logKey, n) {
  state.selectedFeelings[logKey] = n;
  for (let i = 1; i <= 5; i++) {
    const btn = document.getElementById(`feel-${logKey}-${i}`);
    if (btn) btn.classList.toggle('active', i === n);
  }
}

function logExercise(logKey, exName, planned, dayLabel) {
  const weight  = parseFloat(document.getElementById(`w-${logKey}-weight`).value) || 0;
  const reps    = parseInt(document.getElementById(`w-${logKey}-reps`).value)     || 0;
  const sets    = parseInt(document.getElementById(`w-${logKey}-sets`).value)     || 0;
  const feeling = state.selectedFeelings[logKey] || 3;

  if (!weight && !reps) { showToast('請填入重量或次數'); return; }

  google.script.run
    .withSuccessHandler(() => {
      showToast(`${exName} 已記錄！`);
      if (!state.workoutLog[dayLabel]) state.workoutLog[dayLabel] = {};
      state.workoutLog[dayLabel][exName] = { actual_weight: weight, reps, sets };
      renderWorkout(state.workoutData);
    })
    .withFailureHandler(e => showToast('錯誤：' + e.message))
    .logWorkout({ date: todayStr(), day_label: dayLabel, exercise: exName, planned, actual_weight: weight, reps, sets, feeling });
}

  const el = document.getElementById('weekly-content');
  const isDeficit = data.deficit >= 0;
  const absDeficit = Math.abs(data.deficit);

  const dayStrip = data.days.map(d => {
    const kcal = Math.round(d.totals.kcal);
    const dow = ['日','一','二','三','四','五','六'][new Date(d.date + 'T00:00:00').getDay()];
    return `<div class="day-strip-item${kcal > 0 ? ' has-data' : ''}" data-action="goto-date" data-date="${d.date}">
      <div class="day-strip-dow">${dow}</div>
      <div class="day-strip-kcal${kcal === 0 ? ' empty' : ''}">${kcal > 0 ? kcal : '—'}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="weekly-nav">
      <button data-action="week-nav" data-offset="${state.weekOffset - 1}">‹</button>
      <span>${data.weekLabel}</span>

    </div>

    <div class="day-strip">${dayStrip}</div>

    <div class="card weekly-hero">
      <div class="weekly-big-label">${isDeficit ? '本週熱量缺口' : '本週熱量盈餘'}</div>

      <div style="font-size:11px;color:var(--text-3);margin-top:4px">kcal</div>
      ${data.fatLostG !== 0 ? `<div class="weekly-fat">預估${isDeficit ? '消耗' : '增加'}脂肪：<span>${Math.abs(data.fatLostG)}g</span></div>` : ''}
      ${(()=>{ const ai=getActiveMilestoneIdx(); const ms=MILESTONES[ai]; const d=Math.max(0,Math.ceil((new Date(ms.date+'T00:00:00')-new Date())/86400000)); return `<div style="font-size:12px;color:var(--text-3);margin-top:10px">${ms.icon} 距「${ms.label}」還有 <strong style="color:var(--peach-deep)">${d}</strong> 天 · 目標體脂 ${ms.bf}%</div>`; })()}

              <div class="week-day-dow-badge">${dow}</div>

            ${d.workouts.map(w => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.04)">
                <div style="font-size:12px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.exercise}</div>
                <div style="font-size:11px;color:var(--text-2);font-weight:600;flex-shrink:0;margin-left:8px">${w.weight > 0 ? w.weight + 'kg' : '—'} × ${w.reps}下 × ${w.sets}組</div>
                <div style="font-size:13px;margin-left:6px;flex-shrink:0">${feelEmoji[w.feeling - 1] || '💪'}</div>
              </div>`).join('')}
          </div>` : '';

        return `<div class="week-day-card" data-action="goto-date" data-date="${d.date}">
          <div class="week-day-header">
            <div class="week-day-dow-badge">${dow}</div>
            <div class="week-day-date-str">${mmdd}</div>
            ${d.dayType ? `<div class="week-day-exbadge ${exBadgeClass}">${exBadgeText}</div>` : ''}
          </div>
          <div class="week-day-kcal-row">
            <div class="week-day-kcal-eaten">${kcal.toLocaleString()}</div>
            <div class="week-day-kcal-sep">kcal</div>
            ${targetKcal ? `<div class="week-day-kcal-sep">/</div><div class="week-day-kcal-target">${targetKcal}</div>` : ''}
          </div>
          <div class="week-day-macro-row">
            <div class="week-day-macro">
              <div class="week-day-macro-label">蛋白質</div>
              <div class="week-day-macro-val">${Math.round(d.totals.p)}g</div>
            </div>
            <div class="week-day-macro">
              <div class="week-day-macro-label">碳水</div>
              <div class="week-day-macro-val">${Math.round(d.totals.c)}g</div>
            </div>
            <div class="week-day-macro">
              <div class="week-day-macro-label">脂肪</div>
              <div class="week-day-macro-val">${Math.round(d.totals.f)}g</div>
            </div>
          </div>
          ${workoutHtml}
        </div>`;
      }).join('')}
    </div>
  `;
}

function gotoDate(dateStr) {
  state.currentDate = dateStr;
  switchView('food', document.querySelectorAll('.nav-btn')[0]);
  loadFood(dateStr);
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Init ──
window.addEventListener('load', () => {
  loadFood(state.currentDate);

  // ── Event delegation：meals list ──
  document.getElementById('meals-list').addEventListener('click', function(e) {
    const card = e.target.closest('[data-action="delete-meal"]');
    if (!card) return;
    confirmDelete(parseInt(card.dataset.id), decodeURIComponent(card.dataset.desc || ''));
  });

  // ── Event delegation：workout content ──
  document.getElementById('workout-content').addEventListener('click', function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    if (action === 'toggle-plan') togglePlan(t.dataset.key);
    else if (action === 'aerobic-log') openLogAerobic();
    else if (action === 'aerobic-del') {
      if (confirm('刪除此記錄？')) deleteAerobic(parseInt(t.dataset.id));
    }
    else if (action === 'feeling') setFeeling(t.dataset.key, parseInt(t.dataset.n));
    else if (action === 'log-ex') logExercise(
      t.dataset.logkey,
      decodeURIComponent(t.dataset.name),
      decodeURIComponent(t.dataset.planned),
      decodeURIComponent(t.dataset.label)
    );
  });

  // ── Event delegation：weekly content ──
  document.getElementById('weekly-content').addEventListener('click', function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    if (t.dataset.action === 'goto-date') gotoDate(t.dataset.date);
    else if (t.dataset.action === 'week-nav') loadWeekly(parseInt(t.dataset.offset));
  });
});
</script>
</body>
</html>
