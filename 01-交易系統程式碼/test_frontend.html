<!DOCTYPE html>
<html>
<head>
    <title>測試持倉顯示</title>
</head>
<body>
    <h1>測試 API 端點</h1>
    <button onclick="testAPI()">測試 /api/holdings</button>
    <div id="result"></div>

    <script>
    const API_BASE_URL = 'http://localhost:9999';
    
    async function testAPI() {
        try {
            const response = await fetch(`${API_BASE_URL}/api/holdings`);
            const data = await response.json();
            
            let html = `<h2>結果 (${data.count} 筆)</h2><ul>`;
            data.data.forEach(item => {
                html += `<li>${item.symbol} x${item.quantity} @ ${item.price}</li>`;
            });
            html += '</ul>';
            
            document.getElementById('result').innerHTML = html;
        } catch (error) {
            document.getElementById('result').innerHTML = `<p>錯誤: ${error.message}</p>`;
        }
    }
    </script>
</body>
</html>
