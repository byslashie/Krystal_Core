{% extends "base.html" %}

{% block title %}📈 績效分析 - Krystal AI 交易系統{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📈 績效分析</h1>
    <p class="subtitle">詳細的投資績效統計與分析</p>
</div>

<section class="section">
    <div class="section-header">
        <h2>績效摘要</h2>
        <p class="section-subtitle">關鍵績效指標</p>
    </div>
    <div class="card">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; padding: 20px;">
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">年度報酬</div>
                <div style="font-size: 24px; font-weight: 600; color: #10b981;">+24.5%</div>
            </div>
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">月均報酬</div>
                <div style="font-size: 24px; font-weight: 600; color: #3b82f6;">+2.1%</div>
            </div>
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">勝率</div>
                <div style="font-size: 24px; font-weight: 600; color: #f59e0b;">62%</div>
            </div>
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">獲利因子</div>
                <div style="font-size: 24px; font-weight: 600; color: #8b5cf6;">2.15</div>
            </div>
        </div>
    </div>
</section>

<section class="section">
    <div class="section-header">
        <h2>績效走勢</h2>
        <p class="section-subtitle">過去 1 年的收益曲線</p>
    </div>
    <div class="chart-card">
        <div id="performance-chart" style="height: 400px;"></div>
    </div>
</section>

<section class="section">
    <div class="section-header">
        <h2>月度績效</h2>
        <p class="section-subtitle">按月度統計的報酬</p>
    </div>
    <div class="card">
        <div id="monthly-performance" style="padding: 20px; color: #6b7280;">
            加載中...
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 加載績效數據
    console.log('Loading performance data...');
});
</script>
{% endblock %}
