<script>
    // 性能曲線圖表
    setTimeout(function() {
        const dates = Array.from({length: 30}, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - (29 - i));
            return d.toLocaleDateString('zh-TW', {month: 'short', day: 'numeric'});
        });
        const performance = [100, 101.2, 100.8, 102.1, 103.5, 102.8, 104.2, 105.1, 104.5, 106.3, 107.2, 106.8, 108.1, 109.5, 108.9, 110.2, 111.5, 110.8, 112.3, 113.8, 112.5, 114.2, 115.1, 114.5, 116.3, 117.8, 116.9, 118.5, 119.2, 118.4];

        if (typeof Plotly !== 'undefined') {
            const trace = {
                x: dates,
                y: performance,
                mode: 'lines',
                line: {color: '#6B21A8', width: 3},
                fill: 'tozeroy',
                fillcolor: 'rgba(107, 33, 168, 0.1)'
            };
            const layout = {
                title: '月度績效走勢',
                xaxis: {title: '日期'},
                yaxis: {title: '績效指數'},
                height: 300,
                margin: {t: 40, b: 40, l: 60, r: 40}
            };
            Plotly.newPlot('performance-curve-chart', [trace], layout, {responsive: true});
        }
    }, 100);

    console.log('績效分析頁面已加載');
</script>
