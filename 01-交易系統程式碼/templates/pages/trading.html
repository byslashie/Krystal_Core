<!-- 交易面板頁面 -->
<div class="page-title">💹 交易面板</div>
<div class="page-subtitle">交易下單、持倉管理</div>

<!-- 快速下單 -->
<div class="section">
    <div class="section-header">
        <h2>⚡ 快速下單</h2>
    </div>
    <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid #E8E0FF;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px;">
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">股票代碼</label>
                <input type="text" placeholder="e.g. AAPL" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">方向</label>
                <select style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px; font-size: 14px;">
                    <option>買入</option>
                    <option>賣出</option>
                </select>
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">數量</label>
                <input type="number" placeholder="100" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">價格類型</label>
                <select style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px; font-size: 14px;">
                    <option>市價</option>
                    <option>限價</option>
                </select>
            </div>
        </div>
        <button style="width: 100%; padding: 12px; background: #6B21A8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;">提交訂單</button>
    </div>
</div>

<!-- 活躍訂單 -->
<div class="section">

</div>
