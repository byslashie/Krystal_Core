<!-- 策略配置 -->
<div class="section">
    <div class="section-header">
        <h2>⚙️ 策略配置</h2>
        <p>調整策略參數和風險設定</p>
    </div>
    <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid #E8E0FF;">
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px; font-weight: 600;">選擇策略</label>
            <select id="strategy-select" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px; font-size: 14px;">
                <option>技術面策略</option>
                <option>強勢股優化</option>
                <option>總經策略</option>
            </select>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">最大持倉數</label>
                <input type="number" value="10" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px;">
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">單筆風險 (%)</label>
                <input type="number" value="2" step="0.1" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px;">
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">止損點數 (%)</label>
                <input type="number" value="5" step="0.1" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px;">
            </div>
            <div>
                <label style="display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px;">止盈倍數</label>
                <input type="number" value="2" step="0.1" style="width: 100%; padding: 10px; border: 1px solid #E8E0FF; border-radius: 8px;">
            </div>
        </div>
        <button style="width: 100%; padding: 12px; background: #6B21A8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 16px;">保存配置</button>
    </div>
</div>
