{% extends "base.html" %}

{% block title %}⚠️ 風險控制 - Krystal AI 交易系統{% endblock %}

{% block content %}
<div class="page-header">
    <h1>⚠️ 風險控制</h1>
    <p class="subtitle">實時監控和管理投資風險</p>
</div>

<section class="section">
    <div class="section-header">
        <h2>風險指標概覽</h2>
        <p class="section-subtitle">關鍵風險指標一覽</p>
    </div>
    <div class="card">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 20px;">
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">最大回撤</div>
                <div style="font-size: 24px; font-weight: 600; color: #ef4444;">-12.5%</div>
            </div>
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">波動率</div>
                <div style="font-size: 24px; font-weight: 600; color: #f59e0b;">18.3%</div>
            </div>
            <div class="metric-summary-card">
                <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">夏普比率</div>
                <div style="font-size: 24px; font-weight: 600; color: #10b981;">1.45</div>
            </div>
        </div>
    </div>
</section>

<section class="section">
    <div class="section-header">
        <h2>單筆持倉風險</h2>
        <p class="section-subtitle">按風險加權的持倉分析</p>
    </div>
    <div class="card">
        <div id="risk-holdings" style="padding: 20px; color: #6b7280;">
            加載中...
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 加載風險數據
    console.log('Loading risk data...');
});
</script>
{% endblock %}
