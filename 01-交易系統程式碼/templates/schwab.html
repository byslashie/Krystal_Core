<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Schwab 帳戶連接 - Krystal AI 交易系統</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .schwab-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .schwab-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .schwab-icon {
            font-size: 48px;
        }

        .schwab-title h1 {
            margin: 0 0 5px 0;
            font-size: 28px;
            color: #1f2937;
        }

        .schwab-title p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
        }

        /* Status Card */
        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-content h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 600;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge.connected {
            background: #10b981;
        }

        .status-badge.disconnected {
            background: #ef4444;
        }

        /* Auth Section */
        .auth-section {
            background: #f9fafb;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            border-left: 4px solid #667eea;
        }

        .auth-section h3 {
            margin-top: 0;
            color: #1f2937;
            font-size: 16px;
        }

        .auth-section p {
            color: #6b7280;
            font-size: 14px;
            margin: 0 0 16px 0;
            line-height: 1.6;
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        /* Features List */
        .features-list {
            background: #f9fafb;
            padding: 24px;
            border-radius: 12px;
            margin-top: 24px;
        }

        .features-list h4 {
            margin-top: 0;
            color: #1f2937;
            font-size: 14px;
            font-weight: 600;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .feature-item:last-child {
            border-bottom: none;
        }

        .feature-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-text {
            flex: 1;
        }

        .feature-text h5 {
            margin: 0 0 4px 0;
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
        }

        .feature-text p {
            margin: 0;
            font-size: 12px;
            color: #6b7280;
        }

        /* Alert Messages */
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .alert-info {
            background: #dbeafe;
            color: #0c2d6b;
            border-left: 4px solid #3b82f6;
        }

        /* Account Info */
        .account-info {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-top: 24px;
        }

        .account-info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .account-info-row:last-child {
            border-bottom: none;
        }

        .account-info-label {
            color: #6b7280;
            font-weight: 500;
        }

        .account-info-value {
            color: #1f2937;
            font-weight: 600;
        }

        /* Loading state */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">💎</span>
                <span class="logo-text">Krystal AI 交易系統</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-btn">📊 儀表板</a>
                <a href="/schwab" class="nav-btn active">🔐 Schwab 連接</a>
            </nav>
        </div>
    </header>

    <div class="schwab-container">
        <!-- Header -->
        <div class="schwab-header">
            <div class="schwab-icon">🏦</div>
            <div class="schwab-title">
                <h1>Schwab 帳戶連接</h1>
                <p>授權 Schwab API 以實現自動交易和帳戶監控</p>
            </div>
        </div>

        <!-- Status Card -->
        <div class="status-card" id="status-card">
            <div class="status-content">
                <h3>連接狀態</h3>
                <span class="status-badge disconnected" id="status-badge">檢查中...</span>
            </div>
            <div style="font-size: 48px;" id="status-icon">⏳</div>
        </div>

        <!-- Alert Messages -->
        <div id="alerts"></div>

        <!-- Main Content -->
        <div id="auth-content"></div>

        <!-- Features -->
        <div class="features-list">
            <h4>🎯 Schwab 整合功能</h4>
            <div class="feature-item">
                <div class="feature-icon">💰</div>
                <div class="feature-text">
                    <h5>實時帳戶監控</h5>
                    <p>自動同步帳戶餘額、持倉和現金狀態</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📈</div>
                <div class="feature-text">
                    <h5>自動化交易執行</h5>
                    <p>根據策略信號自動下單和管理持倉</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-text">
                    <h5>成交紀錄同步</h5>
                    <p>實時同步成交記錄到 Google Sheets</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">
                    <h5>安全授權</h5>
                    <p>使用 OAuth 2.0 標準協議，安全可靠</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 檢查連接狀態
        async function checkSchwabStatus() {
            try {
                const response = await fetch('/api/schwab/status');
                const data = await response.json();

                const statusBadge = document.getElementById('status-badge');
                const statusIcon = document.getElementById('status-icon');
                const authContent = document.getElementById('auth-content');

                if (data.connected) {
                    // 已連接
                    statusBadge.textContent = '✓ 已連接';
                    statusBadge.className = 'status-badge connected';
                    statusIcon.textContent = '✓';

                    authContent.innerHTML = `
                        <div class="auth-section">
                            <h3>✓ Schwab 帳戶已授權</h3>
                            <p>您的 Schwab 帳戶已成功連接。系統可以：</p>
                            <ul style="margin: 12px 0; padding-left: 20px; color: #6b7280; font-size: 14px;">
                                <li>實時監控帳戶資金和持倉</li>
                                <li>執行自動化交易</li>
                                <li>同步成交紀錄到 Google Sheets</li>
                            </ul>
                            <button class="btn-secondary" onclick="reauthorize()">重新授權</button>
                            <button class="btn-secondary" onclick="disconnect()" style="margin-left: 12px;">斷開連接</button>
                        </div>
                    `;
                } else {
                    // 未連接
                    statusBadge.textContent = '✗ 未連接';
                    statusBadge.className = 'status-badge disconnected';
                    statusIcon.textContent = '✗';

                    authContent.innerHTML = `
                        <div class="auth-section">
                            <h3>⚠️ 尚未連接 Schwab 帳戶</h3>
                            <p>點擊下方按鈕使用 Schwab OAuth 授權，授權後系統將獲得以下權限：</p>
                            <ul style="margin: 12px 0; padding-left: 20px; color: #6b7280; font-size: 14px;">
                                <li><strong>accounts</strong> - 讀取帳戶信息</li>
                                <li><strong>positions</strong> - 查看持倉和資產</li>
                                <li><strong>orders</strong> - 管理訂單和交易</li>
                            </ul>
                            <button class="btn-primary" onclick="startAuthorization()">🔗 連接 Schwab 帳戶</button>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('auth-content').innerHTML = `
                    <div class="alert alert-error">
                        <strong>❌ 錯誤:</strong> 無法檢查連接狀態 - ${error.message}
                    </div>
                `;
            }
        }

        // 開始授權流程
        async function startAuthorization() {
            try {
                const response = await fetch('/api/schwab/auth-url');
                const data = await response.json();

                if (data.status === 'success' && data.auth_url) {
                    // 在新窗口打開授權頁面
                    window.location.href = data.auth_url;
                } else {
                    alert('❌ 無法生成授權 URL: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ 授權失敗: ' + error.message);
            }
        }

        // 重新授權
        function reauthorize() {
            if (confirm('確定要重新授權嗎？')) {
                startAuthorization();
            }
        }

        // 斷開連接
        function disconnect() {
            if (confirm('確定要斷開 Schwab 連接嗎？')) {
                alert('⚠️ 斷開功能尚未實裝，請聯繫管理員');
                // TODO: 實作斷開連接邏輯
            }
        }

        // 頁面加載時檢查狀態
        window.addEventListener('load', checkSchwabStatus);

        // 定期檢查狀態（每 30 秒）
        setInterval(checkSchwabStatus, 30000);
    </script>
</body>
</html>
